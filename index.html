<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>闖關遊戲——廟宇文化</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Press Start 2P', cursive, "Microsoft JhengHei", sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: linear-gradient(to bottom, #001133, #003366);
            touch-action: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 2px 2px #000;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            text-align: center;
        }

        .hidden { display: none !important; }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #ffcc00;
            border: 4px solid #fff;
            color: #000;
            cursor: pointer;
            margin-top: 20px;
            font-family: inherit;
        }

        button:active { transform: scale(0.95); }

        h1 { font-size: 24px; color: #ffcc00; margin-bottom: 30px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="start-screen" class="screen">
            <h1>闖關遊戲<br>——廟宇文化——</h1>
            <p style="color: #aaa;">滑鼠/觸控移動，點擊發射</p>
            <button onclick="startGame()">開始遊戲</button>
        </div>

        <div id="game-over-screen" class="screen hidden">
            <h1 id="end-title">遊戲結束</h1>
            <p id="end-score"></p>
            <button onclick="location.reload()">重新挑戰</button>
        </div>
    </div>
</div>

<script>
/** 遊戲資料設定 **/
const questions = [
    { q: "財神爺\n(Cáishén yé)", a: "保佑財運、事業\n(bǎoyòu cáiyùn shìyè)", options: ["保佑財運、事業\n(bǎoyòu cáiyùn shìyè)", "保佑健康平安", "保佑航海安全"] },
    { q: "文昌帝君\n(Wénchāng dìjūn)", a: "保佑學業、考試\n(bǎoyòu xiéyè kǎoshì)", options: ["保佑學業、考試\n(bǎoyòu xiéyè kǎoshì)", "保佑生意興隆", "保佑姻緣美滿"] },
    { q: "天后宮\n(Tiānhòu gōng)", a: "媽祖\n(Māzǔ)", options: ["媽祖\n(Māzǔ)", "觀世音", "關聖帝君"] },
    { q: "孔廟\n(Kǒngmiào)", a: "孔子\n(Kǒngzǐ)", options: ["孔子\n(Kǒngzǐ)", "老子", "孟子"] },
    { q: "福德宮\n(Fúdégōng)", a: "土地公\n(Tǔdìgōng)", options: ["土地公\n(Tǔdìgōng)", "城隍爺", "月下老人"] },
    { q: "行天宮\n(Xíngtiāngōng)", a: "關聖帝君\n(Guānshèng dìjūn)", options: ["關聖帝君\n(Guānshèng dìjūn)", "保生大帝", "彌勒佛"] },
    { q: "龍門進\n(Lóng mén jìn)", a: "從廟宇右側門口進入", options: ["從廟宇右側門口進入", "從廟宇左側門口進入", "從正門直接進入"] },
    { q: "虎門出\n(Hǔ mén chū)", a: "從廟宇左側門口出去", options: ["從廟宇左側門口出去", "從廟宇右側門口出去", "從後門出去"] },
    { q: "擲筊\n(Zhíjiǎo)", a: "請示神明\n(qǐngshì shénmíng)", options: ["請示神明\n(qǐngshì shénmíng)", "燒香禮拜", "清理桌面"] },
    { q: "抽籤\n(Chōuqiān)", a: "尋求指引\n(xúnqiú zhǐyǐn)", options: ["尋求指引\n(xúnqiú zhǐyǐn)", "祈求財富", "還願儀式"] }
];

/** 基礎設定 **/
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height;
let player, bullets = [], enemies = [], particles = [];
let currentLevel = 0;
let hp = 3;
let gameState = 'START'; // START, PLAYING, LEVEL_UP, GAMEOVER
let audioCtx;

function initCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
}

window.addEventListener('resize', initCanvas);
initCanvas();

/** 音效引擎 **/
function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    if (type === 'shoot') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(); osc.stop(now + 0.1);
    } else if (type === 'hit') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.2);
        osc.start(); osc.stop(now + 0.2);
    } else if (type === 'error') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.3);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(); osc.stop(now + 0.3);
    }
}

/** 遊戲物件 **/
class Player {
    constructor() {
        this.w = 120;
        this.h = 80;
        this.x = width / 2;
        this.y = height - 120;
    }
    draw() {
        // 畫像素風飛機
        ctx.fillStyle = '#ff3333';
        ctx.fillRect(this.x - 20, this.y, 40, 40); // 機身
        ctx.fillStyle = '#fff';
        ctx.fillRect(this.x - 40, this.y + 10, 80, 10); // 機翼
        
        // 顯示題目
        ctx.fillStyle = 'white';
        ctx.font = '14px "Microsoft JhengHei"';
        ctx.textAlign = 'center';
        const lines = questions[currentLevel].q.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, this.x, this.y + 65 + (i * 18));
        });
    }
}

class Bullet {
    constructor(x, y) { this.x = x; this.y = y; this.r = 5; }
    update() { this.y -= 10; }
    draw() {
        ctx.fillStyle = '#ffff00';
        ctx.fillRect(this.x - 4, this.y - 4, 8, 8);
    }
}

class Enemy {
    constructor(text, isCorrect, index) {
        this.text = text;
        this.isCorrect = isCorrect;
        this.w = 140;
        this.h = 70;
        this.x = (width / 4) * (index + 1) - this.w / 2;
        this.y = -100;
        this.speed = 1.5 + (currentLevel * 0.2);
    }
    update() { this.y += this.speed; }
    draw() {
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 3;
        ctx.strokeRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(this.x, this.y, this.w, this.h);
        
        ctx.fillStyle = 'white';
        ctx.font = '12px "Microsoft JhengHei"';
        const lines = this.text.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, this.x + this.w / 2, this.y + 30 + (i * 18));
        });
    }
}

/** 邏輯控制 **/
function spawnEnemies() {
    enemies = [];
    const qData = questions[currentLevel];
    const shuffled = [...qData.options].sort(() => Math.random() - 0.5);
    shuffled.forEach((opt, i) => {
        enemies.push(new Enemy(opt, opt === qData.a, i));
    });
}

function startGame() {
    document.getElementById('start-screen').classList.add('hidden');
    gameState = 'PLAYING';
    player = new Player();
    hp = 3;
    currentLevel = 0;
    spawnEnemies();
    requestAnimationFrame(gameLoop);
}

function nextLevel() {
    currentLevel++;
    if (currentLevel >= questions.length) {
        endGame(true);
    } else {
        spawnEnemies();
    }
}

function endGame(win) {
    gameState = 'GAMEOVER';
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = win ? "恭喜通關！" : "再接再厲！";
    document.getElementById('end-score').innerText = `最終關卡：第 ${currentLevel + 1} 關`;
}

/** 繪製循環 **/
function gameLoop() {
    if (gameState !== 'PLAYING') return;

    ctx.clearRect(0, 0, width, height);

    // UI: HP and Level
    ctx.fillStyle = '#ffcc00';
    ctx.font = '16px "Press Start 2P"';
    ctx.textAlign = 'left';
    ctx.fillText(`LV: ${currentLevel + 1}/10`, 20, 40);
    ctx.fillText(`HP: ${'❤️'.repeat(hp)}`, 20, 70);

    // Player
    player.draw();

    // Bullets
    bullets.forEach((b, bi) => {
        b.update();
        b.draw();
        if (b.y < 0) bullets.splice(bi, 1);
        
        enemies.forEach((e, ei) => {
            if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                bullets.splice(bi, 1);
                if (e.isCorrect) {
                    playSound('hit');
                    nextLevel();
                } else {
                    playSound('error');
                    hp--;
                    enemies.splice(ei, 1);
                    if (hp <= 0) endGame(false);
                }
            }
        });
    });

    // Enemies
    enemies.forEach((e, ei) => {
        e.update();
        e.draw();
        
        // 碰撞玩家
        if (e.y + e.h > player.y && e.x < player.x + 40 && e.x + e.w > player.x - 40) {
            playSound('error');
            hp--;
            enemies.splice(ei, 1);
            if (hp <= 0) endGame(false);
        }

        // 超出邊界重新生成
        if (e.y > height) {
            spawnEnemies();
        }
    });

    requestAnimationFrame(gameLoop);
}

/** 事件監聽 **/
canvas.addEventListener('mousemove', (e) => {
    if (player) player.x = e.clientX;
});

canvas.addEventListener('touchmove', (e) => {
    if (player) {
        player.x = e.touches[0].clientX;
        e.preventDefault();
    }
}, { passive: false });

canvas.addEventListener('mousedown', () => {
    if (gameState === 'PLAYING') {
        bullets.push(new Bullet(player.x, player.y));
        playSound('shoot');
    }
});

canvas.addEventListener('touchstart', (e) => {
    if (gameState === 'PLAYING') {
        bullets.push(new Bullet(player.x, player.y));
        playSound('shoot');
        e.preventDefault();
    }
}, { passive: false });

</script>
</body>
</html>
