<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣廟宇文化配對遊戲 - 5x4 完美版</title>
    <style>
        :root {
            --temple-red: #8e1a1a;
            --temple-gold: #d4af37;
            --bg-dark: #1a0505;
        }

        /* 核心設定：禁止捲動並撐滿全螢幕 */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; 
            background-color: var(--bg-dark);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        h1 { font-size: 1.1rem; margin: 8px 0 2px 0; color: var(--temple-gold); }
        .stats { font-size: 0.8rem; margin-bottom: 5px; }

        /* 5x4 網格系統：關鍵在於使用 vh 單位確保不超出高度 */
        .game-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 欄 */
            grid-template-rows: repeat(4, 1fr);    /* 4 列 */
            gap: 6px;
            width: 95vw;
            max-width: 700px;
            height: 78vh; /* 限制總高度在 78% 的螢幕內 */
            perspective: 1000px;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
            border-radius: 4px;
        }

        /* 翻牌邏輯：翻牌後不位移 */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 4px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box;
        }

        /* 華麗背面：紅底金框 */
        .card-back {
            background: radial-gradient(circle, #b32428, #7a1111);
            border: 2px solid var(--temple-gold);
            z-index: 2;
        }
        .card-back::after {
            content: "🧧"; font-size: 1.2rem; filter: drop-shadow(0 0 3px gold);
        }

        /* 正面：白底 */
        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
            z-index: 1;
            border: 1px solid var(--temple-gold);
            color: #222;
        }

        /* 圖片處理：縮小後的適配 */
        .real-img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .img-overlay {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(142, 26, 26, 0.85); color: #fff;
            font-size: 0.55rem; text-align: center; padding: 2px 0;
        }

        /* 文字階層優化 */
        .text-container { padding: 4px; text-align: center; }
        .main-term {
            font-size: 0.8rem; font-weight: 900; color: #b32428;
            display: block; border-bottom: 1px solid #eee; margin-bottom: 2px;
        }
        .sub-desc { font-size: 0.6rem; color: #555; display: block; line-height: 1.1; }

        /* 結束畫面 */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; z-index: 999;
        }
        button { padding: 8px 20px; background: var(--temple-gold); border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }

        @media (max-width: 400px) {
            h1 { font-size: 0.9rem; }
            .game-container { gap: 4px; }
        }
    </style>
</head>
<body>

    <h1>🏮 台灣廟宇文化配對 🏮</h1>
    <div class="stats">Moves: <span id="moves">0</span></div>

    <div class="game-container" id="gameBoard"></div>

    <div id="overlay">
        <h2 style="color: var(--temple-gold); font-size: 2.5rem;">🎊 大吉 🎊</h2>
        <p>恭喜完成所有配對！</p>
        <button onclick="resetGame()">再次挑戰 (Play Again)</button>
    </div>

    <script>
        const images = {
            'caishen': 'https://images.unsplash.com/photo-1610450949065-1f2842486981?auto=format&fit=crop&w=300&q=80',
            'wenchang': 'https://images.unsplash.com/photo-1516979187457-637abb4f9353?auto=format&fit=crop&w=300&q=80',
            'tianhou': 'https://images.unsplash.com/photo-1632230103932-840810452932?auto=format&fit=crop&w=300&q=80',
            'kong': 'https://images.unsplash.com/photo-1590012314607-cda9d9b699ae?auto=format&fit=crop&w=300&q=80',
            'fude': 'https://images.unsplash.com/photo-1628153303889-983617307044?auto=format&fit=crop&w=300&q=80',
            'xingtian': 'https://images.unsplash.com/photo-1543731068-7e0f5beff43a?auto=format&fit=crop&w=300&q=80',
            'right-gate': 'https://images.unsplash.com/photo-1605553551528-76579c372658?auto=format&fit=crop&w=300&q=80',
            'left-gate': 'https://images.unsplash.com/photo-1599818817366-0775d7426162?auto=format&fit=crop&w=300&q=80',
            '筊': 'https://images.unsplash.com/photo-1613253757476-c56088248555?auto=format&fit=crop&w=300&q=80',
            'sticks': 'https://images.unsplash.com/photo-1628153303632-411a77484d41?auto=format&fit=crop&w=300&q=80'
        };

        const pairs = [
            { img: 'caishen', main: '財神爺(Cáishén yé)', sub: '保佑財運、事業 (bǎoyòu cáiyùn shìyè)' },
            { img: 'wenchang', main: '文昌帝君(Wénchāng dìjūn)', sub: '保佑學業、考試 (bǎoyòu xiéyè kǎoshì)' },
            { img: 'tianhou', main: '天后宮(Tiānhòu gōng)', sub: '媽祖 (Māzǔ)' },
            { img: 'kong', main: '孔廟(Kǒngmiào)', sub: '孔子 (Kǒngzǐ)' },
            { img: 'fude', main: '福德宮(Fúdégōng)', sub: '土地公 (Tǔdìgōng)' },
            { img: 'xingtian', main: '行天宮(Xíngtiāngōng)', sub: '關聖帝君 (Guānshèng dìjūn)' },
            { img: 'right-gate', main: '龍門進(Lóng mén jìn)', sub: '', note: '面對廟宇右側' },
            { img: 'left-gate', main: '虎門出(Hǔ mén chū)', sub: '', note: '面對廟宇左側' },
            { img: '筊', main: '擲筊(Zhíjiǎo)', sub: '請示神明 (qǐngshì shénmíng)' },
            { img: 'sticks', main: '抽籤(Chōuqiān)', sub: '尋求指引 (xúnqiú zhǐyǐn)' }
        ];

        let cardsData = [];
        let flippedCards = [];
        let moves = 0;
        let matched = 0;

        function init() {
            cardsData = [];
            pairs.forEach((p, i) => {
                cardsData.push({ type: 'img', content: images[p.img], note: p.note, id: i });
                cardsData.push({ type: 'text', main: p.main, sub: p.sub, id: i });
            });
            cardsData.sort(() => Math.random() - 0.5);
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            cardsData.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner" onclick="flip(this)" data-id="${d.id}">
                        <div class="card-back"></div>
                        <div class="card-front">
                            ${d.type === 'img' ? 
                                `<img src="${d.content}" class="real-img">${d.note ? `<div class="img-overlay">${d.note}</div>` : ''}` : 
                                `<div class="text-container"><span class="main-term">${d.main}</span><span class="sub-desc">${d.sub}</span></div>`
                            }
                        </div>
                    </div>`;
                board.appendChild(card);
            });
        }

        function flip(el) {
            if (flippedCards.length === 2 || el.parentElement.classList.contains('flipped') || el.parentElement.classList.contains('matched')) return;
            el.parentElement.classList.add('flipped');
            flippedCards.push(el);
            if (flippedCards.length === 2) {
                moves++; document.getElementById('moves').innerText = moves;
                if (flippedCards[0].dataset.id === flippedCards[1].dataset.id) {
                    flippedCards.forEach(c => c.parentElement.classList.add('matched'));
                    matched++;
                    flippedCards = [];
                    if (matched === 10) setTimeout(() => document.getElementById('overlay').style.display = 'flex', 500);
                } else {
                    setTimeout(() => {
                        flippedCards.forEach(c => c.parentElement.classList.remove('flipped'));
                        flippedCards = [];
                    }, 1000);
                }
            }
        }

        function resetGame() {
            moves = 0; matched = 0; flippedCards = [];
            document.getElementById('moves').innerText = '0';
            document.getElementById('overlay').style.display = 'none';
            init();
        }

        init();
    </script>
</body>
</html>
