<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temple Odyssey: Culture Flyer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zpix&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; background: linear-gradient(to bottom, #02050f, #101a43); touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: white; }
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); pointer-events: auto; text-align: center; padding: 20px; }
        .hidden { display: none !important; }
        .main-title { font-size: 38px; color: #ffcc00; font-weight: bold; margin-bottom: 20px; text-shadow: 4px 4px #c0392b; line-height: 1.3; }
        .desc-box { background: rgba(255, 255, 255, 0.08); border: 2px solid #ffcc00; padding: 20px; border-radius: 12px; max-width: 650px; margin-bottom: 25px; line-height: 1.6; font-size: 18px; text-align: left; }
        button { padding: 15px 45px; font-size: 24px; background: #ffcc00; border: 4px solid #fff; color: #000; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .hp-bar { position: absolute; top: 25px; left: 25px; font-size: 28px; }
        .level-indicator { position: absolute; top: 25px; right: 25px; font-size: 22px; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="start-screen" class="screen">
            <div class="main-title">飛行闖關遊戲<br>——臺灣廟宇文化——</div>
            <div class="desc-box">
                <b style="color: #ffcc00;">【遊戲規則】</b><br>
                你是飛行員，請射擊與機身題目相對應的正確選項。<br>
                題目與選項的關聯包含：<br>
                • <b style="color: #00ffcc;">神祇與職能：</b>辨識神明所護佑的範疇。<br>
                • <b style="color: #00ffcc;">廟宇與主神：</b>配對各知名廟宇供奉的主神。<br>
                • <b style="color: #00ffcc;">儀式與意涵：</b>理解祭祀動作與其代表的功能。<br>
                <br>
                <b style="color: #ffcc00;">【操作說明】</b><br>
                1. 拖曳或移動滑鼠控制飛行。<br>
                2. 點擊畫面發射子彈，共有 3 次失敗機會。
            </div>
            <button onclick="startGame()">開始遊戲</button>
        </div>
        <div id="game-over-screen" class="screen hidden">
            <div id="end-title" class="main-title">遊戲結束</div>
            <p id="end-score" style="font-size: 22px; margin-bottom: 30px;"></p>
            <button onclick="location.reload()">重新開始</button>
        </div>
        <div id="ingame-ui" class="hidden">
            <div class="hp-bar" id="hp-display"></div>
            <div class="level-indicator" id="lvl-display"></div>
        </div>
    </div>
</div>

<script>
const questions = [
    { q: "財神爺\n(Cáishén yé)", a: "保佑財運、事業\n(bǎoyòu cáiyùn shìyè)", opts: ["保佑財運、事業\n(bǎoyòu cáiyùn shìyè)", "保佑健康平安\n(jiànkāng píng'ān)", "保佑航海安全\n(hánghǎi ānquán)"] },
    { q: "文昌帝君\n(Wénchāng dìjūn)", a: "保佑學業、考試\n(bǎoyòu xuéyè kǎoshì)", opts: ["保佑學業、考試\n(bǎoyòu xuéyè kǎoshì)", "保佑生意興隆\n(shēngyì xīnglóng)", "保佑姻緣美滿\n(yīnyuán měimǎn)"] },
    { q: "天后宮\n(Tiānhòu gōng)", a: "媽祖\n(Māzǔ)", opts: ["媽祖\n(Māzǔ)", "觀世音\n(Guānshìyīn)", "關聖帝君\n(Guānshèng dìjūn)"] },
    { q: "孔廟\n(Kǒngmiào)", a: "孔子\n(Kǒngzǐ)", opts: ["孔子\n(Kǒngzǐ)", "老子\n(Lǎozǐ)", "孟子\n(Mèngzǐ)"] },
    { q: "福德宮\n(Fúdégōng)", a: "土地公\n(Tǔdìgōng)", opts: ["土地公\n(Tǔdìgōng)", "城隍爺\n(Chénghuángyé)", "月下老人\n(Yuèxià lǎorén)"] },
    { q: "行天宮\n(Xíngtiāngōng)", a: "關聖帝君\n(Guānshèng dìjūn)", opts: ["關聖帝君\n(Guānshèng dìjūn)", "保生大帝\n(Bǎoshēng dàdì)", "彌勒佛\n(Mílèfó)"] },
    { q: "龍門進\n(Lóng mén jìn)", a: "從廟宇右側門口進入", opts: ["從廟宇右側門口進入", "從廟宇左側門口進入", "從正門直接進入"] },
    { q: "虎門出\n(Hǔ mén chū)", a: "從廟宇左側門口出去", opts: ["從廟宇左側門口出去", "從廟宇右側門口出去", "從後門出去"] },
    { q: "擲筊\n(Zhíjiǎo)", a: "請示神明\n(qǐngshì shénmíng)", opts: ["請示神明\n(qǐngshì shénmíng)", "燒香禮拜\n(shāoxiāng lǐbài)", "清理桌面\n(qīnglǐ zhuōmiàn)"] },
    { q: "抽籤\n(Chōuqiān)", a: "尋求指引\n(xúnqiú zhǐyǐn)", opts: ["尋求指引\n(xúnqiú zhǐyǐn)", "祈求財富\n(qíqiú cáifù)", "還願儀式\n(huányuàn yíshì)"] }
];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let width, height, player, bullets = [], enemies = [], currentLevel = 0, hp = 3, gameState = 'START', audioCtx, bgmNode;

function initCanvas() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
}
window.addEventListener('resize', initCanvas);
initCanvas();

/** 音效與背景音樂系統 **/
function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    
    if (type === 'bgm') {
        const loopLen = 2.0;
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * loopLen, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < buffer.length; i++) {
            const t = i / audioCtx.sampleRate;
            // 簡單的 8-bit 低音循環
            const f = [110, 130, 146, 110][Math.floor(t * 4) % 4];
            data[i] = Math.sin(2 * Math.PI * f * t) * 0.1 * (1 - (t * 4 % 1));
        }
        bgmNode = audioCtx.createBufferSource();
        bgmNode.buffer = buffer;
        bgmNode.loop = true;
        const gain = audioCtx.createGain();
        gain.gain.value = 0.3; 
        bgmNode.connect(gain);
        gain.connect(audioCtx.destination);
        bgmNode.start();
    } else if (type === 'victory') {
        if(bgmNode) bgmNode.stop();
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C E G C
        notes.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.frequency.setValueAtTime(f, now + i * 0.15);
            g.gain.setValueAtTime(0.2, now + i * 0.15);
            g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.4);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(now + i * 0.15); osc.stop(now + i * 0.15 + 0.5);
        });
    } else {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        if (type === 'shoot') {
            osc.frequency.setValueAtTime(180, now); osc.frequency.exponentialRampToValueAtTime(700, now + 0.1);
            g.gain.setValueAtTime(0.06, now); osc.start(); osc.stop(now + 0.1);
        } else if (type === 'hit') {
            osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
            g.gain.setValueAtTime(0.1, now); osc.start(); osc.stop(now + 0.1);
        } else if (type === 'error') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now);
            g.gain.setValueAtTime(0.15, now); osc.start(); osc.stop(now + 0.3);
        }
    }
}

class Player {
    constructor() { this.x = width / 2; this.y = height - 180; }
    draw() {
        ctx.save(); ctx.translate(this.x, this.y);
        ctx.fillStyle = '#d32f2f'; ctx.fillRect(-12, 10, 24, 50); 
        ctx.fillStyle = '#ffcc00'; ctx.fillRect(-8, -5, 16, 15);
        ctx.fillStyle = '#f44336'; ctx.fillRect(-45, 25, 90, 12);
        ctx.fillStyle = '#b71c1c'; ctx.fillRect(-20, 55, 40, 8);
        ctx.fillStyle = '#81d4fa'; ctx.fillRect(-6, 5, 12, 10);
        ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = 'bold 24px "Microsoft JhengHei"';
        const lines = questions[currentLevel].q.split('\n');
        lines.forEach((l, i) => { ctx.shadowBlur = 5; ctx.shadowColor = "black"; ctx.fillText(l, 0, 105 + (i * 30)); });
        ctx.restore();
    }
}

class Enemy {
    constructor(text, isCorrect, i) {
        this.text = text; this.isCorrect = isCorrect; this.w = width < 700 ? width * 0.28 : 220; this.h = 100;
        this.x = (width / 4) * (i + 1) - this.w / 2; this.y = -150; this.speed = 1.2;
    }
    update() { this.y += this.speed; }
    draw() {
        ctx.save(); ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 4; ctx.strokeRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.fillStyle = 'white'; ctx.textAlign = 'center';
        const lines = this.text.split('\n');
        lines.forEach((l, i) => { ctx.font = i === 0 ? 'bold 21px "Microsoft JhengHei"' : '17px "Microsoft JhengHei"'; ctx.fillText(l, this.x + this.w / 2, this.y + 45 + (i * 28)); });
        ctx.restore();
    }
}

function spawnEnemies() {
    enemies = []; const q = questions[currentLevel];
    const shuffled = [...q.opts].sort(() => Math.random() - 0.5);
    shuffled.forEach((opt, i) => enemies.push(new Enemy(opt, opt === q.a, i)));
}

function startGame() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('ingame-ui').classList.remove('hidden');
    gameState = 'PLAYING'; player = new Player(); hp = 3; currentLevel = 0; spawnEnemies();
    playSound('bgm'); // 啟動背景音樂
    updateUI(); requestAnimationFrame(gameLoop);
}

function updateUI() {
    document.getElementById('hp-display').innerText = '❤️'.repeat(hp);
    document.getElementById('lvl-display').innerText = `Progress: ${currentLevel + 1} / 10`;
}

function gameLoop() {
    if (gameState !== 'PLAYING') return;
    ctx.clearRect(0, 0, width, height);
    player.draw();
    bullets.forEach((b, bi) => {
        b.y -= 12; ctx.fillStyle = '#00ffcc'; ctx.fillRect(b.x-4, b.y, 8, 20);
        if (b.y < 0) bullets.splice(bi, 1);
        enemies.forEach((e, ei) => {
            if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                bullets.splice(bi, 1);
                if (e.isCorrect) {
                    playSound('hit'); currentLevel++;
                    if (currentLevel >= questions.length) showEndScreen("恭喜通關！");
                    else { spawnEnemies(); updateUI(); }
                } else {
                    playSound('error'); hp--; updateUI(); enemies.splice(ei, 1);
                    if (hp <= 0) showEndScreen("再接再厲");
                }
            }
        });
    });
    enemies.forEach((e, ei) => {
        e.update(); e.draw();
        if (e.y + e.h > player.y && e.x < player.x + 35 && e.x + e.w > player.x - 35 && e.y < player.y + 60) {
            playSound('error'); hp--; updateUI(); enemies.splice(ei, 1);
            if (hp <= 0) showEndScreen("再接再厲");
        }
        if (e.y > height) spawnEnemies();
    });
    requestAnimationFrame(gameLoop);
}

function showEndScreen(title) {
    gameState = 'END';
    if(title === "恭喜通關！") playSound('victory'); // 播放成功音效
    else if(bgmNode) bgmNode.stop(); // 失敗則停止音樂
    document.getElementById('ingame-ui').classList.add('hidden');
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('end-title').innerText = title;
    document.getElementById('end-score').innerText = title === "恭喜通關！" ? "你已精通臺灣廟宇文化知識！" : `挑戰結束於第 ${currentLevel + 1} 關`;
}

canvas.addEventListener('mousemove', (e) => { if (player) player.x = e.clientX; });
canvas.addEventListener('touchmove', (e) => { if (player) { player.x = e.touches[0].clientX; e.preventDefault(); } }, {passive:false});
const fire = () => { if (gameState === 'PLAYING') { bullets.push({x: player.x, y: player.y}); playSound('shoot'); } };
canvas.addEventListener('mousedown', fire);
canvas.addEventListener('touchstart', (e) => { fire(); e.preventDefault(); }, {passive:false});
</script>
</body>
</html>
