<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣廟宇文化配對遊戲</title>
    <style>
        :root {
            --temple-red: #8e1a1a;
            --temple-gold: #d4af37;
            --bg-dark: #1a0505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-dark);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: white; display: flex; flex-direction: column; align-items: center;
        }

        /* 標題與指示區域 */
        .header-section { text-align: center; margin-top: 5px; margin-bottom: 5px; }
        h1 { font-size: 1.1rem; margin: 0; color: var(--temple-gold); text-shadow: 1px 1px 2px #000; }
        
        .instructions { font-size: 0.75rem; line-height: 1.3; color: #ccc; margin-top: 2px; }
        .instructions b { color: var(--temple-gold); }

        .stats { font-size: 0.85rem; font-weight: bold; margin: 3px 0; color: #fff; }

        /* 5x4 網格系統 */
        .game-container {
            display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 6px; width: 96vw; max-width: 750px; height: 72vh; perspective: 1000px;
        }

        .card { position: relative; width: 100%; height: 100%; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.5s ease; transform-style: preserve-3d; border-radius: 4px;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched { opacity: 0.5; cursor: default; }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 4px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box;
        }

        /* 華麗背面：紅金底紋 */
        .card-back {
            background: radial-gradient(circle, #b32428, #7a1111);
            border: 2px solid var(--temple-gold); z-index: 2;
        }
        .card-back::after { content: "福"; font-size: 1.5rem; color: var(--temple-gold); font-family: "標楷體", serif; }

        /* 正面樣式 */
        .card-front {
            background-color: #fff; transform: rotateY(180deg); z-index: 1;
            border: 1px solid var(--temple-gold); color: #222; overflow: hidden;
        }

        /* 圖片處理 */
        .real-img { width: 100%; height: 100%; object-fit: cover; }
        .img-overlay {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(142, 26, 26, 0.9); color: #fff;
            font-size: 0.6rem; text-align: center; padding: 2px 0; font-weight: bold;
        }

        /* 文字階層：冒號前大，冒號後小 */
        .text-container { padding: 4px; text-align: center; width: 100%; }
        .main-term {
            font-size: 0.8rem; font-weight: 900; color: #b32428;
            display: block; border-bottom: 1px solid #eee; margin-bottom: 2px; padding-bottom: 2px;
        }
        .sub-desc { font-size: 0.62rem; color: #555; display: block; line-height: 1.2; }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; z-index: 999;
        }
        button { padding: 10px 25px; background: var(--temple-gold); border: none; font-weight: bold; border-radius: 4px; cursor: pointer; color: #000; }

        @media (max-width: 500px) {
            h1 { font-size: 1rem; }
            .instructions { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>🏮 台灣廟宇文化配對 🏮</h1>
        <div class="instructions">
            請翻開卡牌，將<b>「實景圖片」</b>與正確的<b>「文化說明」</b>配對。<br>
            Match the <b>Real Images</b> with their corresponding <b>Cultural Descriptions</b>.
        </div>
    </div>

    <div class="stats">Moves: <span id="moves">0</span></div>
    
    <div class="game-container" id="gameBoard"></div>

    <div id="overlay">
        <h2 style="color: var(--temple-gold); font-size: 2.5rem;">🎊 大吉 🎊</h2>
        <p>恭喜完成所有文化配對！<br>Congratulations on completing the challenge!</p>
        <button onclick="resetGame()">再次挑戰 (Play Again)</button>
    </div>

    <script>
        // 建議：若圖片不穩定，請將照片存至 GitHub 並將下方網址改為檔名，例如 'mazu.jpg'
        const images = {
            'caishen': 'https://picsum.photos/id/1059/300/400', 
            'wenchang': 'https://picsum.photos/id/24/300/400',
            'tianhou': 'https://picsum.photos/id/1029/300/400',
            'kong': 'https://picsum.photos/id/431/300/400',
            'fude': 'https://picsum.photos/id/835/300/400',
            'xingtian': 'https://picsum.photos/id/1014/300/400',
            'right-gate': 'https://picsum.photos/id/528/300/400',
            'left-gate': 'https://picsum.photos/id/529/300/400',
            '筊': 'https://picsum.photos/id/1060/300/400',
            'sticks': 'https://picsum.photos/id/1073/300/400'
        };

        const pairs = [
            { img: 'caishen', main: '財神爺(Cáishén yé)', sub: '保佑財運、事業 (bǎoyòu cáiyùn shìyè)', fb: '💰' },
            { img: 'wenchang', main: '文昌帝君(Wénchāng dìjūn)', sub: '保佑學業、考試 (bǎoyòu xiéyè kǎoshì)', fb: '✍️' },
            { img: 'tianhou', main: '天后宮(Tiānhòu gōng)', sub: '媽祖 (Māzǔ)', fb: '🌊' },
            { img: 'kong', main: '孔廟(Kǒngmiào)', sub: '孔子 (Kǒngzǐ)', fb: '📖' },
            { img: 'fude', main: '福德宮(Fúdégōng)', sub: '土地公 (Tǔdìgōng)', fb: '👴' },
            { img: 'xingtian', main: '行天宮(Xíngtiāngōng)', sub: '關聖帝君 (Guānshèng dìjūn)', fb: '⚔️' },
            { img: 'right-gate', main: '龍門進(Lóng mén jìn)', sub: '', note: '面對廟宇右側', fb: '🐉' },
            { img: 'left-gate', main: '虎門出(Hǔ mén chū)', sub: '', note: '面對廟宇左側', fb: '🐅' },
            { img: '筊', main: '擲筊(Zhíjiǎo)', sub: '請示神明 (qǐngshì shénmíng)', fb: '🧧' },
            { img: 'sticks', main: '抽籤(Chōuqiān)', sub: '尋求指引 (xúnqiú zhǐyǐn)', fb: '📜' }
        ];

        let cardsData = [];
        let flippedCards = [];
        let moves = 0;
        let matched = 0;

        function init() {
            cardsData = [];
            pairs.forEach((p, i) => {
                cardsData.push({ type: 'img', content: images[p.img], note: p.note, fallback: p.fb, id: i });
                cardsData.push({ type: 'text', main: p.main, sub: p.sub, id: i });
            });
            cardsData.sort(() => Math.random() - 0.5);
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            cardsData.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner" onclick="flip(this)" data-id="${d.id}">
                        <div class="card-back"></div>
                        <div class="card-front">
                            ${d.type === 'img' ? 
                                `<img src="${d.content}" class="real-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                                 <div style="display:none; font-size:2.5rem;">${d.fallback}</div>
                                 ${d.note ? `<div class="img-overlay">${d.note}</div>` : ''}` : 
                                `<div class="text-container"><span class="main-term">${d.main}</span><span class="sub-desc">${d.sub}</span></div>`
                            }
                        </div>
                    </div>`;
                board.appendChild(card);
            });
        }

        function flip(el) {
            if (flippedCards.length === 2 || el.parentElement.classList.contains('flipped') || el.parentElement.classList.contains('matched')) return;
            el.parentElement.classList.add('flipped');
            flippedCards.push(el);
            if (flippedCards.length === 2) {
                moves++; document.getElementById('moves').innerText = moves;
                if (flippedCards[0].dataset.id === flippedCards[1].dataset.id) {
                    flippedCards.forEach(c => c.parentElement.classList.add('matched'));
                    matched++;
                    flippedCards = [];
                    if (matched === 10) setTimeout(() => document.getElementById('overlay').style.display = 'flex', 500);
                } else {
                    setTimeout(() => {
                        flippedCards.forEach(c => c.parentElement.classList.remove('flipped'));
                        flippedCards = [];
                    }, 1000);
                }
            }
        }

        function resetGame() {
            moves = 0; matched = 0; flippedCards = [];
            document.getElementById('moves').innerText = '0';
            document.getElementById('overlay').style.display = 'none';
            init();
        }

        init();
    </script>
</body>
</html>
