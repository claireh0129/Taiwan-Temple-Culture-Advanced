<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣廟宇文化配對遊戲 - 實景版</title>
    <style>
        :root {
            --temple-red: #8e1a1a;
            --temple-gold: #d4af37;
            --bg-color: #2c0b0b; /* 深色底襯托華麗感 */
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#4a1212 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        h1 { color: var(--temple-gold); font-size: 1.2rem; margin: 5px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .stats { font-size: 0.9rem; margin-bottom: 8px; color: #eee; }

        /* 極致縮減尺寸以符合單一頁面 */
        .game-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            width: 95vw;
            max-width: 800px;
            max-height: 80vh;
        }

        .card { aspect-ratio: 4/5; cursor: pointer; perspective: 1000px; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched .card-inner { opacity: 0.6; filter: grayscale(50%); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 4px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box; overflow: hidden;
        }

        /* 華麗背面設計 */
        .card-back {
            background: linear-gradient(135deg, #b32428 0%, #8e1a1a 100%);
            border: 3px double var(--temple-gold);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            position: relative;
        }
        .card-back::after {
            content: "🧧"; font-size: 1.5rem; filter: drop-shadow(0 0 5px gold);
        }

        /* 正面樣式 */
        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
            border: 1px solid var(--temple-gold);
            color: #333;
        }

        /* 圖片卡樣式 */
        .real-img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .img-overlay {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(142, 26, 26, 0.8); color: white;
            font-size: 0.6rem; text-align: center; padding: 2px 0;
        }

        /* 文字卡樣式 */
        .text-container { padding: 5px; text-align: center; }
        .main-term {
            font-size: 0.85rem; font-weight: 900; color: #b32428;
            display: block; border-bottom: 1px solid #ddd; margin-bottom: 4px; padding-bottom: 2px;
        }
        .sub-desc { font-size: 0.65rem; color: #555; display: block; line-height: 1.2; }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { padding: 8px 20px; background: var(--temple-gold); border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }

        @media (max-width: 500px) {
            .game-container { grid-template-columns: repeat(4, 1fr); }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <h1>🏮 台灣廟宇文化配對 🏮</h1>
    <div class="stats">Moves: <span id="moves">0</span></div>

    <div class="game-container" id="gameBoard"></div>

    <div id="overlay">
        <h2 style="color: var(--temple-gold);">🎊 大吉 🎊</h2>
        <p>恭喜完成挑戰！</p>
        <button onclick="resetGame()">再次挑戰</button>
    </div>
