<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣廟宇文化配對遊戲</title>
    <style>
        :root {
            --temple-red: #8e1a1a;
            --temple-gold: #d4af37;
            --bg-dark: #1a0505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-dark);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            color: white; display: flex; flex-direction: column; align-items: center;
        }

        .header-section { text-align: center; margin-top: 10px; margin-bottom: 5px; }
        h1 { font-size: 1.2rem; margin: 0; color: var(--temple-gold); }
        
        .instructions { font-size: 0.8rem; line-height: 1.4; color: #ddd; margin-top: 4px; }
        .instructions b { color: var(--temple-gold); font-weight: bold; }

        .stats { font-size: 0.9rem; margin: 5px 0; }

        /* 5x4 網格 */
        .game-container {
            display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 8px; width: 95vw; max-width: 800px; height: 70vh; perspective: 1000px;
        }

        .card { position: relative; width: 100%; height: 100%; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.5s; transform-style: preserve-3d; border-radius: 6px;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched { opacity: 0.4; cursor: default; transition: opacity 0.5s; }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            border-radius: 6px; display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box;
        }

        /* 華麗背面 */
        .card-back {
            background: radial-gradient(circle, #b32428, #7a1111);
            border: 2px solid var(--temple-gold); z-index: 2;
        }
        .card-back::after { content: "福"; font-size: 1.8rem; color: var(--temple-gold); font-family: "標楷體", serif; text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }

        /* 正面樣式 */
        .card-front {
            background-color: #fff; transform: rotateY(180deg); z-index: 1;
            border: 1px solid var(--temple-gold); color: #222; overflow: hidden;
        }

        /* 圖片縮放：確保填滿 */
        .real-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .img-overlay {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(142, 26, 26, 0.85); color: #fff;
            font-size: 0.65rem; text-align: center; padding: 3px 0; font-weight: bold;
        }

        /* 文字卡樣式 */
        .text-container { padding: 6px; text-align: center; width: 100%; box-sizing: border-box; }
        .main-term {
            font-size: 0.9rem; font-weight: 900; color: #b32428;
            display: block; border-bottom: 2px solid var(--temple-gold); margin-bottom: 4px; padding-bottom: 3px;
        }
        .sub-desc { font-size: 0.7rem; color: #444; display: block; line-height: 1.2; font-weight: 500; }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); flex-direction: column; justify-content: center; align-items: center; z-index: 999;
        }
        button { padding: 12px 30px; background: var(--temple-gold); border: none; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 1rem; }

        @media (max-width: 600px) {
            .main-term { font-size: 0.75rem; }
            .sub-desc { font-size: 0.6rem; }
        }
    </style>
</head>
<body>

    <div class="header-section">
        <h1>🏮 台灣廟宇文化配對 🏮</h1>
        <div class="instructions">
            請翻開卡牌，將<b>「圖片」</b>與正確的<b>「文字」</b>配對。<br>
            Please flip the cards to match the <b>Images</b> with the correct <b>Text</b>.
        </div>
    </div>

    <div class="stats">Moves: <span id="moves">0</span></div>
    
    <div class="game-container" id="gameBoard"></div>

    <div id="overlay">
        <h2 style="color: var(--temple-gold); font-size: 3rem; margin-bottom: 10px;">🎊 大吉 🎊</h2>
        <p style="font-size: 1.2rem;">恭喜完成挑戰！<br>Congratulations!</p>
        <button onclick="resetGame()">再次挑戰 (Play Again)</button>
    </div>

    <script>
        // 使用更精確的台灣文化相關圖源
        const images = {
            'caishen': 'https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/Caishen.jpg/400px-Caishen.jpg', 
            'wenchang': 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Wenchang_Dijun.jpg/400px-Wenchang_Dijun.jpg',
            'tianhou': 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/06/Taipei_Mazu_Temple.jpg/400px-Taipei_Mazu_Temple.jpg',
            'kong': 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Taipei_Confucius_Temple.jpg/400px-Taipei_Confucius_Temple.jpg',
            'fude': 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Tudi_Gong.jpg/400px-Tudi_Gong.jpg',
            'xingtian': 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/ae/Xingtian_Temple.jpg/400px-Xingtian_Temple.jpg',
            'right-gate': 'https://cdn.pixabay.com/photo/2018/11/24/02/10/temple-3834854_1280.jpg', // 龍門示意
            'left-gate': 'https://cdn.pixabay.com/photo/2021/01/21/11/55/temple-5937144_1280.jpg',  // 虎門示意
            '筊': 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Jiao-bei.jpg/400px-Jiao-bei.jpg',
            'sticks': 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Fortune_sticks.jpg/400px-Fortune_sticks.jpg'
        };

        const pairs = [
            { img: 'caishen', main: '財神爺(Cáishén yé)', sub: '保佑財運、事業 (bǎoyòu cáiyùn shìyè)' },
            { img: 'wenchang', main: '文昌帝君(Wénchāng dìjūn)', sub: '保佑學業、考試 (bǎoyòu xiéyè kǎoshì)' },
            { img: 'tianhou', main: '天后宮(Tiānhòu gōng)', sub: '媽祖 (Māzǔ)' },
            { img: 'kong', main: '孔廟(Kǒngmiào)', sub: '孔子 (Kǒngzǐ)' },
            { img: 'fude', main: '福德宮(Fúdégōng)', sub: '土地公 (Tǔdìgōng)' },
            { img: 'xingtian', main: '行天宮(Xíngtiāngōng)', sub: '關聖帝君 (Guānshèng dìjūn)' },
            { img: 'right-gate', main: '龍門進(Lóng mén jìn)', sub: '', note: '面對廟宇右側' },
            { img: 'left-gate', main: '虎門出(Hǔ mén chū)', sub: '', note: '面對廟宇左側' },
            { img: '筊', main: '擲筊(Zhíjiǎo)', sub: '請示神明 (qǐngshì shénmíng)' },
            { img: 'sticks', main: '抽籤(Chōuqiān)', sub: '尋求指引 (xúnqiú zhǐyǐn)' }
        ];

        let cardsData = [];
        let flippedCards = [];
        let moves = 0;
        let matched = 0;

        function init() {
            cardsData = [];
            pairs.forEach((p, i) => {
                cardsData.push({ type: 'img', content: images[p.img], note: p.note, id: i });
                cardsData.push({ type: 'text', main: p.main, sub: p.sub, id: i });
            });
            cardsData.sort(() => Math.random() - 0.5);
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            cardsData.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-inner" onclick="flip(this)" data-id="${d.id}">
                        <div class="card-back"></div>
                        <div class="card-front">
                            ${d.type === 'img' ? 
                                `<img src="${d.content}" class="real-img" loading="lazy">
                                 ${d.note ? `<div class="img-overlay">${d.note}</div>` : ''}` : 
                                `<div class="text-container"><span class="main-term">${d.main}</span><span class="sub-desc">${d.sub}</span></div>`
                            }
                        </div>
                    </div>`;
                board.appendChild(card);
            });
        }

        function flip(el) {
            if (flippedCards.length === 2 || el.parentElement.classList.contains('flipped') || el.parentElement.classList.contains('matched')) return;
            el.parentElement.classList.add('flipped');
            flippedCards.push(el);
            if (flippedCards.length === 2) {
                moves++; document.getElementById('moves').innerText = moves;
                if (flippedCards[0].dataset.id === flippedCards[1].dataset.id) {
                    flippedCards.forEach(c => c.parentElement.classList.add('matched'));
                    matched++;
                    flippedCards = [];
                    if (matched === 10) setTimeout(() => document.getElementById('overlay').style.display = 'flex', 600);
                } else {
                    setTimeout(() => {
                        flippedCards.forEach(c => c.parentElement.classList.remove('flipped'));
                        flippedCards = [];
                    }, 1000);
                }
            }
        }

        function resetGame() {
            moves = 0; matched = 0; flippedCards = [];
            document.getElementById('moves').innerText = '0';
            document.getElementById('overlay').style.display = 'none';
            init();
        }

        init();
    </script>
</body>
</html>
